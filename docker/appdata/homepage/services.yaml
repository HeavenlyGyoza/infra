---
# For configuration options and examples, please see:
# https://gethomepage.dev/latest/configs/services

- CORE:
    - Traefik:
        icon: traefik.svg
        href: https://traefik.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Reverse proxy
        # widget:
        #     type: traefik
        #     url: https://traefik:8080
    
    - Dozzle:
        icon: dozzle.svg
        href: https://dozzle.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Real-time log viewer

    - Portainer:
        icon: portainer.svg
        href: https://portainer.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Web UI docker container management
        widget:
            type: portainer
            url: https://portainer:9443
            env: 1
            key: {{HOMEPAGE_VAR_PORTAINER_API_KEY}}

    - Adguard Home:
        icon: adguard-home.svg
        href : https://adguard.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: DNS Sink Ad-blocker
        # widget:
        #     type: adguard
        #     url: http://adguard.host.or.ip
        #     username: admin
        #     password: password

    - Glances:
        icon: glances.svg
        description: System monitoring
        widget:
            type: glances
            url: http://glances:61208
            # username: user # optional if auth enabled in Glances
            # password: pass # optional if auth enabled in Glances
            version: 4 # required only if running glances v4 or higher, defaults to 3
            metric: cpu
            diskUnits: bytes # optional, bytes (default) or bbytes. Only applies to disk
            refreshInterval: 5000 # optional - in milliseconds, defaults to 1000 or more, depending on the metric
            pointsLimit: 15 # optional, defaults to 15

    - Calibre Web Automated:
        icon: calibre.svg
        url: https://href.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        widget:
            type: calibreweb
            url: http://calibre:8083
            username: username
            password: password

    - Beszel:
        icon: beszel.svg
        href : https://beszel.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Monitoring dashboard
        widget:
            type: beszel
            url: http://beszel:8090
            # username: username # email
            # password: password
            # systemId: systemId # optional
            version: 2 # optional, default is 1

- MEDIA:
    - Jellyfin:
        icon: jellyfin.svg
        href: https://jellyfin.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Self-hosted media server
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: {{HOMEPAGE_VAR_JELLYFIN_API_KEY}}
          enableBlocks: true # optional, defaults to false
          enableNowPlaying: true # optional, defaults to true
          enableUser: true # optional, defaults to false
          showEpisodeNumber: false # optional, defaults to false
          expandOneStreamToTwoRows: true # optional, defaults to true
    
    - Jellyseerr:
        icon: jellyseerr.svg
        href: https://jellyseerr.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Media request management
        widget:
            type: jellyseerr
            url: http://jellyseerr:5055
            key: {{HOMEPAGE_VAR_JELLYSEERR_API_KEY}}

    - qBittorrent:
        icon: qbittorrent.svg
        href: https://qbitt.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Torrent client
        widget:
          type: qbittorrent
          url: http://gluetun:8080 # qBittorrent only reachable through gluetun
          username: {{HOMEPAGE_VAR_QBITT_USERNAME}}
          password: {{HOMEPAGE_VAR_QBITT_PW}}

    
    - Radarr:
        icon: radarr.svg
        href: https://radarr.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Automated movie management
        widget:
            type: radarr
            url: http://radarr:7878
            key: {{HOMEPAGE_VAR_RADARR_API_KEY}}

    - Sonarr:
        icon: sonarr.svg
        href: https://sonarr.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Automated series management
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: {{HOMEPAGE_VAR_SONARR_API_KEY}}
    
    - Prowlarr:
        icon: prowlarr.svg
        href: https://prowlarr.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Indexer manager
        widget:
            type: prowlarr
            url: http://prowlarr:9696
            key: {{HOMEPAGE_VAR_PROWLARR_API_KEY}}
    
    - Bazarr:
        icon: bazarr.svg
        href: https://bazarr.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Automated subtitles management
        widget:
            type: bazarr
            url: http://bazarr:6767
            key: {{HOMEPAGE_VAR_BAZARR_API_KEY}}
    
    - JDownloader2:
        icon: jdownloader2.png
        href: https://jdown.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Download manager
        # widget:
        #     type: jdownloader
        #     client: jdownloader


- UTILITIES:
    - Uptime Kuma:
        icon: uptime-kuma.svg
        href: https://kuma.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Self-hosted uptime monitoring

    - Scrutiny:
        icon: scrutiny.svg
        href: https://scrutiny.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Hard-drive health monitoring
        widget:
            type: scrutiny
            url: http://scrutiny:8080

    - Speedtest Tracker:
        icon: ookla-speedtest.png
        href: https://speedtest.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Speedtest monitoring
        widget:
            type: speedtest
            url: http://speedtest:80
    
    - Filebrowser:
        icon: filebrowser.svg
        href: https://filebrowser.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Web file managing interface

    - Smokeping:
        icon: smokeping.webp
        href: https://smokeping.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Network latency monitoring

    - Gatus:
        icon: gatus.svg
        href: https://gatus.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Health and uptime monitoring
        widget:
            type: gatus
            url: http://gatus:8080

    - Stirling PDF:
        icon: stirling-pdf.svg
        href: https://pdf.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: PDF management suite


- MISC: 
    - Mealie:
        icon: mealie.svg
        href: https://mealie.{{HOMEPAGE_VAR_DOMAINNAME_SERVER}}
        description: Recipe manager
        widget:
          type: mealie
          url: http://mealie:9000
          key: {{HOMEPAGE_VAR_MEALIE_API_KEY}}

- GAME SERVERS:
    - Minecraft [Prominence II]:
        icon: minecraft.svg
        description: Modded 1.20.1 server
        widget:
          type: minecraft
          url: udp://{{HOMEPAGE_VAR_HOST_IP}}:25565

    - Minecraft [Vanilla]:
        icon: minecraft.svg
        description: Vanilla optimized 1.21.1 server
        widget:
          type: minecraft
          url: udp://{{HOMEPAGE_VAR_HOST_IP}}:25566